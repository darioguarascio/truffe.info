services:
  postgresql:
    image: postgres:16-alpine
    container_name: truffe.postgresql
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: truffe
      POSTGRES_PASSWORD: truffe
      POSTGRES_DB: truffe
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truffe"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: truffe.app
    restart: unless-stopped
    ports:
      - "127.0.0.1:4321:4321"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-truffe}:${POSTGRES_PASSWORD:-truffe}@${POSTGRES_HOST:-postgresql}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-truffe}
      HOST: 0.0.0.0
      PORT: 4321
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
