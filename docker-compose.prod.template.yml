# Template per docker-compose di produzione
# Generato automaticamente dalla GitHub Action al push di un tag

services:
  postgresql:
    image: postgres:16-alpine
    container_name: truffe.postgresql
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-truffe}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: darioguarascio/truffe.info:${IMAGE_TAG}
    container_name: truffe.app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4321}:4321"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB:-truffe}
      HOST: 0.0.0.0
      PORT: 4321
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
