# Template per docker-compose di produzione
# Generato automaticamente dalla GitHub Action al push di un tag
# Usa PostgreSQL esterno tramite POSTGRES_HOST

services:
  app:
    image: darioguarascio/truffe.info:${IMAGE_TAG}
    container_name: truffe.app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4321}:4321"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-truffe}
      HOST: 0.0.0.0
      PORT: 4321
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads

volumes:
  uploads:
