# Template per docker-compose di produzione
# Generato automaticamente dalla GitHub Action al push di un tag
# Usa PostgreSQL esterno tramite POSTGRES_HOST

services:
  app:
    image: darioguarascio/truffe.info:${IMAGE_TAG}
    container_name: truffe.app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4321}:4321"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-truffe}
      HOST: 0.0.0.0
      PORT: 4321
      UPLOAD_DIR: /app/uploads
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@truffe.info}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-ciao@truffe.info}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
    volumes:
      - uploads:/app/uploads

volumes:
  uploads:
